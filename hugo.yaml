baseURL: "https://SendoRay.github.io/"
title: "chengzhy's blog"
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: true
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "chengzhy's blog"
  description: "cheng zhiyuan's academic portfolio"
  keywords: [Blog, Portfolio, PaperMod, AI, LLM]
  author: cheng zhiyuan
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  math: true
  
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  
  assets:
    favicon: "<link / abs url>"
    favicon16x16: "<link / abs url>"
    favicon32x32: "<link / abs url>"
    apple_touch_icon: "<link / abs url>"
    safari_pinned_tab: "<link / abs url>"
  
  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35
  
  # profile-mode
  profileMode:
    enabled: false
    title: "chengzhy's blog"
    subtitle: "AI infra and LLM inference optimization"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: About
        url: about
  
  # home-info mode
  homeInfoParams:
    Title: "Hi, I'm chengzhy."
    Content: Welcome to my blog. I focus on AI infra and LLM inference optimization.
  
  socialIcons:
    - name: github
      url: "https://github.com/SendoRay"
    - name: email
      url: "mailto:chengzhy0919@163.com"
    # - name: googlescholar
    #   url: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
    # - name: orcid
    #   url: "https://orcid.org/yourorcidurl"
  
  analytics:
    google:
      SiteVerificationTag: "XYZabc"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"
  
  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true
  
  editPost:
    URL: "https://github.com/SendoRay/SendoRay.github.io/content"
    Text: "Suggest Changes"
    appendFilePath: true
  
  # for search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 40

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - '\\['
              - '\\]'
            - - '$$'
              - '$$'
          inline:
            - - '\\('
              - '\\)'
            - - '$'
              - '$'
        enable: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
